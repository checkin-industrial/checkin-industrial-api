name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Permissoes minimas: so contents:read e packages:write (caso futuramente
# tambem publique no ghcr.io). Docker Hub auth eh via DOCKERHUB_TOKEN
# (access token, NUNCA a senha de login).
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    # Roda so se push for em main OU tag v*; pull_request nunca publica.
    # `workflow_dispatch` permite re-publicacao manual via UI quando preciso.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # vars.DOCKERHUB_NAMESPACE: nome do user/org no Docker Hub que possui o
      # repositorio. Em geral igual ao DOCKERHUB_USERNAME, mas pode ser
      # diferente se usar uma org Docker Hub. Default cai pro USERNAME.
      # vars.IMAGE_NAME: nome do repositorio no Docker Hub. Default: nome do repo.
      - name: Resolve image reference
        id: meta-input
        run: |
          NS="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$NS" ]; then NS="${{ vars.DOCKERHUB_USERNAME }}"; fi
          NAME="${{ vars.IMAGE_NAME }}"
          if [ -z "$NAME" ]; then NAME="checkin-industrial-api"; fi
          echo "image=${NS}/${NAME}" >> "$GITHUB_OUTPUT"

      # docker/metadata-action calcula tags inteligentes:
      # - push em main          → tag :latest, :main, :sha-<short>
      # - push em tag v1.2.3    → tag :latest, :v1.2.3, :1.2, :1
      # Linux multi-arch (amd64 + arm64) e cache via GHA registry.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta-input.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
