# Dependabot config - atualizacoes automaticas de NuGet + GitHub Actions
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Pacotes NuGet da API
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    groups:
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"
      aspnet:
        patterns:
          - "Microsoft.AspNetCore*"
          - "Microsoft.Extensions*"
      test:
        patterns:
          - "xunit*"
          - "Moq"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"

  # Pacotes NuGet do projeto de testes
  - package-ecosystem: "nuget"
    directory: "/src/tests/AppTurismoIndustrial.Api.Tests"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "tests"

  # GitHub Actions usadas nos workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
